<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Biblioteca Pública de Ibros</title>

<style>
:root {
    --bg: #ffffff;
    --text: #222;
    --border: #ddd;
    --input-bg: #f5f5f5;
    --sidebar: #f0f0f0;
}

[data-theme="dark"] {
    --bg: #1a1a1a;
    --text: #eee;
    --border: #444;
    --input-bg: #2a2a2a;
    --sidebar: #2d2d2d;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:200px;
    height:100vh;
    background:var(--sidebar);
    position:fixed;
    padding:20px;
    box-sizing:border-box;
}

.sidebar a {
    display:block;
    margin-bottom:15px;
    text-decoration:none;
    color:var(--text);
    font-weight:bold;
}

/* CONTENIDO */
.main {
    margin-left:200px;
    width:100%;
    text-align:center;
}

/* TITULO */
h1 {
    margin-top:30px;
}

/* CONTROLES */
.toolbar {
    display:flex;
    gap:15px;
    justify-content:center;
    margin:30px;
}

/* BUSCADOR */
.search-box {
    display:flex;
    align-items:center;
    background: var(--input-bg);
    border-radius:30px;
    padding:10px 15px;
    width:320px;
    border:1px solid var(--border);
}

.search-box span {
    margin-right:10px;
}

.search-box input {
    border:none;
    outline:none;
    background:transparent;
    width:100%;
    font-size:16px;
    color:var(--text);
}

/* SELECT - CORREGIDO PARA MODO OSCURO */
select {
    border-radius:30px;
    padding:10px 20px;
    border:1px solid var(--border);
    background: var(--input-bg);
    color: var(--text); /* Asegura que el texto use la variable de color */
    font-size:16px;
    outline: none;
    cursor: pointer;
}

/* Estilo específico para las opciones dentro del select */
select option {
    background: var(--input-bg);
    color: var(--text);
}

/* TABLA */
table {
    width:90%;
    margin:auto;
    border-collapse:collapse;
}

th, td {
    padding:12px;
    border-bottom:1px solid var(--border);
    text-align:center;
}

/* BOTON MODO OSCURO */
#theme-toggle {
    position:fixed;
    top:20px;
    right:20px;
    padding:10px 15px;
    border-radius:20px;
    border:1px solid var(--border);
    background:var(--input-bg);
    color: var(--text);
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="header">
    <img src="file:///C:/Users/dinamizador/Desktop/640px-Escudo_de_Ibros_(Ja%C3%A9n).svg.png" 
     alt="Escudo" 
     style="width: 150px; height: auto; display: block; margin: 0 auto 20px;">
</div>
    <h3>_</h3>
    <a href="file:///C:/Users/dinamizador/Desktop/SMR/Registro%20Biblioteca/acerca%20de.html">Acerca de</a>
</div>

<button id="theme-toggle">Modo oscuro</button>

<div class="main">

<br><br><h1>Registro Biblioteca Pública de Ibros</h1>

<br><div class="toolbar">

    <div class="search-box">
        <span></span>
        <input type="text" id="searchInput" placeholder="Buscar libro...🔎">
    </div>

    <select id="estanterias"></select>

</div>
<br><br>

<table>
<thead>
<tr>
<th>Título</th>
<th>Autor</th>
<th>Código</th>
</tr>
</thead>
<tbody id="cuerpoTabla"></tbody>
</table>

<div id="loader" style="display:none;">Cargando...</div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyBLvG-_RfWct0oych5RoIeQAlK-LpC-Xprp9SM4auL2kwMj81vXLpfg7cEsPKDWaOK/exec';

const select = document.getElementById('estanterias');
const tabla = document.getElementById('cuerpoTabla');
const loader = document.getElementById('loader');
const themeBtn = document.getElementById('theme-toggle');

/* MODO OSCURO */
themeBtn.onclick = () => {
    const actual = document.documentElement.getAttribute('data-theme');
    const nuevo = actual === 'dark' ? 'light' : 'dark';

    document.documentElement.setAttribute('data-theme', nuevo);
    themeBtn.textContent = nuevo === 'dark' ? 'Modo claro' : 'Modo oscuro';
};

/* CARGAR DATOS */
async function cargarDatos(shelf){
    tabla.innerHTML='';
    loader.style.display='block';

    try{
        const res = await fetch(`${API_URL}?estanteria=${encodeURIComponent(shelf)}`);
        const libros = await res.json();
        loader.style.display='none';

        libros.forEach(libro=>{
            if(!libro.titulo || libro.titulo.toLowerCase().includes("título") || libro.titulo.toLowerCase().includes("estanter")) return;

            tabla.innerHTML += `
                <tr>
                    <td>${libro.titulo}</td>
                    <td>${libro.autor || ''}</td>
                    <td>${libro.id || ''}</td>
                </tr>`;
        });

    }catch(e){
        loader.style.display='none';
    }
}

/* INIT */
async function inicializar(){
    const res = await fetch(`${API_URL}?action=getEstanterias`);
    const lista = await res.json();

    lista.forEach(nombre=>{
        const opt=document.createElement('option');
        opt.value=nombre;
        opt.textContent=nombre;
        if(nombre==="Estantería 1") opt.selected=true;
        select.appendChild(opt);
    });

    select.dispatchEvent(new Event('change'));
}

select.addEventListener('change', e=>cargarDatos(e.target.value));

/* BUSCADOR */
document.getElementById('searchInput').addEventListener('keyup', function(){
    const b=this.value.toLowerCase();
    Array.from(tabla.getElementsByTagName('tr')).forEach(f=>{
        f.style.display = f.innerText.toLowerCase().includes(b) ? '' : 'none';
    });
});

inicializar();
</script>

</body>
</html>
